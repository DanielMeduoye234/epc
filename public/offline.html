<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Fold - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #fff; padding: 24px; }
    .container { text-align: center; max-width: 360px; }
    .icon { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #fb923c, #ea580c); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .icon span { color: white; font-size: 28px; font-weight: bold; }
    h1 { font-size: 24px; font-weight: 700; color: #000; margin-bottom: 8px; }
    p { color: #6b7280; font-size: 14px; line-height: 1.5; margin-bottom: 24px; }
    button { background: linear-gradient(to right, #fb923c, #ea580c); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon"><span>EPC</span></div>
    <h1>You&apos;re Offline</h1>
    <p>It looks like you&apos;ve lost your internet connection. Don&apos;t worry — your data is safe. Reconnect to continue using The Fold.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
